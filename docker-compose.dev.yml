services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-storage-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloud-storage-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloud-storage-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: cloud-storage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - cloud-storage-network
  minio:
    image: minio/minio
    container_name: cloud-storage-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKETS: user-files
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cloud-storage-network
    command: [ "server", "--console-address", ":9001", "/data" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    image: yoxaron/cloud-storage-frontend:latest
    container_name: cloud-storage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND_HOST: host.docker.internal
    networks:
      - cloud-storage-network
volumes:
  postgres_data:
  minio_data:
    driver: local
networks:
  cloud-storage-network:
    driver: bridge