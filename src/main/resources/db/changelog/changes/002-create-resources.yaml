databaseChangeLog:
  - changeSet:
      id: 002-create-resources
      author: yoxaron
      changes:
        - createTable:
            tableName: resources
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: size
                  type: bigint
              - column:
                  name: uuid
                  type: uuid
        - addForeignKeyConstraint:
            baseTableName: resources
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_resources_users
        - addUniqueConstraint:
            tableName: resources
            columnNames: user_id, path, name
            constraintName: uq_resource
rollback:
  - dropTable:
      tableName: resources